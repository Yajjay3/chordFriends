<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Acoustic Guitar - cartoon style -->
  <!-- Neck -->
  <rect x="44" y="5" width="12" height="45" rx="2" fill="#c8944a" stroke="#8b6914" stroke-width="1.5"/>
  <!-- Frets -->
  <line x1="44" y1="15" x2="56" y2="15" stroke="#8b6914" stroke-width="1"/>
  <line x1="44" y1="25" x2="56" y2="25" stroke="#8b6914" stroke-width="1"/>
  <line x1="44" y1="35" x2="56" y2="35" stroke="#8b6914" stroke-width="1"/>
  <!-- Headstock -->
  <rect x="42" y="2" width="16" height="8" rx="3" fill="#5c3d1a" stroke="#3d2810" stroke-width="1"/>
  <!-- Tuning pegs -->
  <circle cx="44" cy="5" r="2" fill="#d4a84b"/>
  <circle cx="44" cy="9" r="2" fill="#d4a84b"/>
  <circle cx="56" cy="5" r="2" fill="#d4a84b"/>
  <circle cx="56" cy="9" r="2" fill="#d4a84b"/>
  <!-- Body -->
  <ellipse cx="50" cy="72" rx="28" ry="24" fill="#e8a948" stroke="#8b6914" stroke-width="2"/>
  <!-- Sound hole -->
  <circle cx="50" cy="68" r="9" fill="#5c3d1a"/>
  <circle cx="50" cy="68" r="7.5" fill="#3d2810"/>
  <!-- Bridge -->
  <rect x="43" y="82" width="14" height="3" rx="1" fill="#5c3d1a"/>
  <!-- Strings -->
  <line x1="47" y1="10" x2="47" y2="82" stroke="#f0d890" stroke-width="0.5"/>
  <line x1="50" y1="10" x2="50" y2="82" stroke="#f0d890" stroke-width="0.5"/>
  <line x1="53" y1="10" x2="53" y2="82" stroke="#f0d890" stroke-width="0.5"/>
</svg>
